name: UI tests

on:
  pull_request:
    paths:
      - "better_memory/**"
      - "tests/ui/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ui-tests.yml"
  push:
    branches: [main]
    paths:
      - "better_memory/**"
      - "tests/ui/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ui-tests.yml"

jobs:
  ui-tests:
    name: UI test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install project
        run: uv sync --dev

      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium

      - name: Run UI tests
        run: uv run pytest tests/ui/ -v --tb=short
