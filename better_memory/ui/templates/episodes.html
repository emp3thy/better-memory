{% extends "base.html" %}
{% block title %}Episodes — better-memory{% endblock %}
{% block main %}
<section class="episodes">
  <div id="banner"
       hx-get="{{ url_for('episodes_banner') }}"
       hx-trigger="load, every 30s"
       hx-swap="innerHTML">
  </div>

  <div id="timeline"
       hx-get="{{ url_for('episodes_panel') }}"
       hx-trigger="load, every 30s, episode-closed from:body"
       hx-swap="innerHTML">
  </div>

  <div id="drawer"></div>
</section>
{% endblock %}
