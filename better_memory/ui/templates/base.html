<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}better-memory{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='app.css') }}">
  <script src="{{ url_for('static', filename='htmx.min.js') }}" defer></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">better-memory</div>
    <nav class="tabs">
      <a class="tab {% if active_tab == 'episodes' %}active{% endif %}" href="{{ url_for('episodes') }}">Episodes</a>
      <a class="tab {% if active_tab == 'reflections' %}active{% endif %}" href="{{ url_for('reflections') }}">Reflections</a>
    </nav>
    <button class="close-ui"
            hx-post="{{ url_for('shutdown') }}"
            hx-confirm="Shut down the UI?"
            hx-swap="none">Close UI</button>
  </header>
  <main>
    {% block main %}{% endblock %}
  </main>
</body>
</html>
